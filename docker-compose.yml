services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CODER_ONBOARDING_DOCKER: "true"
    ports:
      - "${PORT:-3007}:3007"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coder_onboarding
      POSTGRES_USER: coder_onboarding
      POSTGRES_PASSWORD: coder_onboarding
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder_onboarding -d coder_onboarding"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
